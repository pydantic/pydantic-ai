## Process

1. Follow the auto-review instructions against the current diff
2. Write the output to `.claude/skills/start-worktree-loop/review-report.md`
3. Evaluate findings:
   - If any **BLOCKING** issues → append them to `plan-output.md` as new items, transition to CODE
