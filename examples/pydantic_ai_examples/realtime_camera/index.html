<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
    <title>Lens — Camera Assistant</title>
    <style>
      :root {
        --bg: #f4f5f7;
        --surface: #ffffff;
        --surface-2: #fafbfc;
        --line: #e5e7eb;
        --line-2: #eceef1;
        --ink: #0f172a;
        --muted: #64748b;
        --faint: #94a3b8;
        --accent: #1f3a5f;
        --accent-soft: #eef2f7;
        --pos: #15803d;
        --neg: #b91c1c;
        --shadow: 0 1px 2px rgba(15, 23, 42, 0.04), 0 4px 16px rgba(15, 23, 42, 0.05);
        font-synthesis: none;
      }
      * { box-sizing: border-box; }
      html, body { height: 100%; margin: 0; }
      body {
        overflow: hidden;
        background: var(--bg);
        color: var(--ink);
        font-family: ui-sans-serif, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        font-size: 15px;
        line-height: 1.5;
        -webkit-font-smoothing: antialiased;
      }
      .shell { max-width: 760px; margin: 0 auto; height: 100dvh; display: flex; flex-direction: column; padding: 20px 18px; gap: 14px; }
      .topbar {
        display: flex; align-items: center; gap: 12px;
        padding: 14px 18px; background: var(--surface); border: 1px solid var(--line);
        border-radius: 14px; box-shadow: var(--shadow);
      }
      .brand { display: flex; align-items: center; gap: 10px; font-weight: 650; letter-spacing: -0.01em; }
      .brand .mark { width: 26px; height: 26px; border-radius: 7px; background: var(--accent); color: #fff;
        display: grid; place-items: center; font-size: 13px; font-weight: 700; }
      .brand small { color: var(--faint); font-weight: 500; margin-left: 2px; }
      .status { margin-left: auto; display: flex; align-items: center; gap: 7px; color: var(--muted); font-size: 13px; }
      .status .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--faint); }
      .status.live .dot { background: var(--pos); box-shadow: 0 0 0 3px rgba(21,128,61,0.15); }

      .stage { position: relative; border: 1px solid var(--line); border-radius: 14px; overflow: hidden; background: #0f172a;
        box-shadow: var(--shadow); aspect-ratio: 4 / 3; }
      .stage video { width: 100%; height: 100%; object-fit: cover; background: #0f172a; }
      .stage .hint-overlay { position: absolute; inset: 0; display: grid; place-items: center; color: #cbd5e1;
        font-size: 14px; text-align: center; padding: 24px; }

      .feed { flex: 1; min-height: 0; overflow-y: auto; display: flex; flex-direction: column; gap: 14px; padding: 4px; }
      .feed > * { flex: 0 0 auto; }
      .row { display: flex; }
      .row.user { justify-content: flex-end; }
      .bubble { max-width: 78%; padding: 10px 14px; border-radius: 14px; }
      .row.user .bubble { background: var(--accent); color: #fff; border-bottom-right-radius: 5px; }
      .row.assistant .bubble { background: var(--surface); border: 1px solid var(--line); border-bottom-left-radius: 5px; box-shadow: var(--shadow); }
      .bubble.pending { opacity: 0.6; font-style: italic; }

      .hint { text-align: center; color: var(--faint); font-size: 12.5px; }
      .bar { display: flex; gap: 10px; align-items: center; }
      .btn { flex: 0 0 auto; border: 0; background: var(--accent); color: #fff; font-weight: 600; font-size: 14px;
        padding: 0 18px; height: 42px; border-radius: 11px; cursor: pointer; transition: background .15s; }
      .btn:hover { background: #16304f; }
      .btn.stop { background: var(--neg); }
      .btn.stop:hover { background: #9f1717; }
      .icbtn { width: 42px; height: 42px; border-radius: 11px; border: 1px solid var(--line); background: var(--surface-2);
        cursor: pointer; font-size: 17px; display: grid; place-items: center; transition: all .15s; }
      .icbtn:hover:not(:disabled) { background: var(--accent-soft); }
      .icbtn.on { background: var(--pos); border-color: var(--pos); color: #fff; animation: pulse 1.4s infinite; }
      .icbtn:disabled { opacity: 0.45; cursor: not-allowed; }
      @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(21,128,61,0.35);} 70% { box-shadow: 0 0 0 9px rgba(21,128,61,0);} 100% { box-shadow: 0 0 0 0 rgba(21,128,61,0);} }
      .composer { flex: 1; display: flex; gap: 10px; align-items: center; padding: 12px; background: var(--surface);
        border: 1px solid var(--line); border-radius: 14px; box-shadow: var(--shadow); }
      .composer input { flex: 1; border: 0; outline: none; background: transparent; color: var(--ink); font-size: 15px; padding: 6px 4px; }
      .composer input::placeholder { color: var(--faint); }
      .send { border: 0; background: var(--accent); color: #fff; font-weight: 600; font-size: 14px; padding: 0 18px; height: 42px; border-radius: 11px; cursor: pointer; transition: background .15s; }
      .send:hover { background: #16304f; }

      .gear { margin-left: 12px; font: inherit; font-size: 13px; color: var(--ink); background: var(--surface-2);
        border: 1px solid var(--line); border-radius: 8px; padding: 5px 10px; cursor: pointer; }
      .gear:hover { border-color: var(--accent); }
      .panel { background: var(--surface); border: 1px solid var(--line); border-radius: 14px; box-shadow: var(--shadow); padding: 14px 16px; }
      .panel[hidden] { display: none; }
      .panel .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(190px, 1fr)); gap: 10px 16px; }
      .panel label { display: flex; flex-direction: column; gap: 4px; font-size: 12px; font-weight: 600;
        color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; }
      .panel .in { font: inherit; font-size: 14px; font-weight: 400; text-transform: none; letter-spacing: 0;
        color: var(--ink); background: var(--surface-2); border: 1px solid var(--line); border-radius: 8px; padding: 7px 9px; }
      .panel .in:focus { outline: none; border-color: var(--accent); }
      .panel .ck { flex-direction: row; align-items: center; gap: 8px; text-transform: none; letter-spacing: 0; font-size: 13px; }
      .panel .ck input { width: 16px; height: 16px; accent-color: var(--accent); }
      .panel-foot { display: flex; justify-content: flex-end; margin-top: 12px; }
    </style>
  </head>
  <body>
    <div class="shell">
      <div class="topbar">
        <div class="brand"><span class="mark">L</span>Lens <small>Camera Assistant</small></div>
        <button id="gear" class="gear" title="Voice settings">⚙ Settings</button>
        <div class="status" id="status"><span class="dot"></span><span id="statusText">tap Start</span></div>
      </div>

      <div class="panel" id="panel" hidden>
        <div class="grid">
          <label>Model<input id="model" class="in" list="models" placeholder="default" autocomplete="off" /></label>
          <datalist id="models">
            <option value="gemini-live-2.5-flash"></option>
            <option value="gemini-live-2.5-flash-native-audio"></option>
            <option value="gemini-2.0-flash-live-preview-04-09"></option>
          </datalist>
          <label>Voice<input id="voice" class="in" list="voices" placeholder="default" autocomplete="off" /></label>
          <datalist id="voices">
            <option value="Puck"></option><option value="Charon"></option><option value="Kore"></option>
            <option value="Fenrir"></option><option value="Aoede"></option><option value="Leda"></option>
            <option value="Orus"></option><option value="Zephyr"></option>
          </datalist>
          <label>Language code<input id="language" class="in" placeholder="e.g. en-US" autocomplete="off" /></label>
          <label>Output<select id="modality" class="in"><option value="audio">audio</option><option value="text">text</option></select></label>
          <label>Turn coverage<select id="turn_coverage" class="in"><option value="">server default</option><option value="activity_only">activity only</option><option value="all_input">all input</option><option value="all_video">all video</option></select></label>
          <label>Start sensitivity<select id="start_sensitivity" class="in"><option value="">default</option><option value="high">high</option><option value="low">low</option></select></label>
          <label>End sensitivity<select id="end_sensitivity" class="in"><option value="">default</option><option value="high">high</option><option value="low">low</option></select></label>
          <label class="ck"><input id="proactive" type="checkbox" />Proactive audio (native)</label>
          <label class="ck"><input id="affective" type="checkbox" />Affective dialog (native)</label>
        </div>
        <div class="panel-foot"><button id="apply" class="send">Apply &amp; restart</button></div>
      </div>

      <div class="stage">
        <video id="video" autoplay playsinline muted></video>
        <div class="hint-overlay" id="hint">Start the session, then talk and point your camera at things to ask about them.</div>
      </div>

      <div class="feed" id="feed"></div>

      <div class="hint">Talk and point your camera at things. Tap 👁 to let the assistant watch and call out changes.</div>
      <div class="bar">
        <button class="btn" id="toggle">Start</button>
        <button class="icbtn" id="watch" title="Watch — let the assistant comment on changes" disabled>👁</button>
        <div class="composer">
          <input id="text" type="text" placeholder="…or type a message" autocomplete="off" />
          <button class="send" id="send">Send</button>
        </div>
      </div>
    </div>

    <script>
      const INPUT_RATE = 16000; // Gemini Live expects 16kHz PCM input
      const OUTPUT_RATE = 24000; // and produces 24kHz output
      const FRAME_MS = 1000; // ~1 camera frame per second
      const FRAME_W = 512; // downscale frames to keep bandwidth/cost low
      const WATCH_MS = 2500; // in Watch mode, nudge the model this often to report changes

      const $ = (id) => document.getElementById(id);
      const feed = $('feed'), video = $('video'), hint = $('hint');
      const statusEl = $('status'), statusText = $('statusText'), toggleBtn = $('toggle'), watchBtn = $('watch');
      const textInput = $('text'), sendBtn = $('send'), panel = $('panel');

      // Settings — seeded from the server's env defaults, sent to /ws as query params.
      const DEFAULTS = __DEFAULTS__;
      $('model').value = DEFAULTS.model || '';
      $('voice').value = DEFAULTS.voice || '';
      $('turn_coverage').value = DEFAULTS.turn_coverage || '';
      $('proactive').checked = !!DEFAULTS.proactive;
      $('affective').checked = !!DEFAULTS.affective;
      function settings() {
        return {
          model: $('model').value, voice: $('voice').value, language: $('language').value,
          modality: $('modality').value, turn_coverage: $('turn_coverage').value,
          start_sensitivity: $('start_sensitivity').value, end_sensitivity: $('end_sensitivity').value,
          proactive: $('proactive').checked ? '1' : '0', affective: $('affective').checked ? '1' : '0',
        };
      }
      function query() {
        const params = new URLSearchParams();
        for (const [k, v] of Object.entries(settings())) if (v !== '' && v != null) params.set(k, v);
        return params.toString();
      }
      $('gear').onclick = () => { panel.hidden = !panel.hidden; };
      $('apply').onclick = async () => {
        panel.hidden = true;
        if (running) { stop(); try { await start(); } catch (err) { setStatus('error: ' + err.message); } }
      };

      function setStatus(text, live) {
        statusText.textContent = text;
        statusEl.classList.toggle('live', !!live);
      }

      let stick = true;
      feed.addEventListener('scroll', () => {
        stick = feed.scrollHeight - feed.scrollTop - feed.clientHeight < 120;
      });
      function addBubble(text, who) {
        const row = document.createElement('div'); row.className = 'row ' + who;
        const b = document.createElement('div'); b.className = 'bubble'; b.textContent = text;
        row.appendChild(b); feed.appendChild(row);
        if (stick) requestAnimationFrame(() => { feed.scrollTop = feed.scrollHeight; });
        return b;
      }

      let playCtx = null, playHead = 0, scheduled = [];
      function ensurePlayback() {
        if (!playCtx) playCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: OUTPUT_RATE });
        if (playCtx.state === 'suspended') playCtx.resume();
      }
      function playPCM(ab) {
        ensurePlayback();
        const i16 = new Int16Array(ab); if (!i16.length) return;
        const f32 = new Float32Array(i16.length);
        for (let i = 0; i < i16.length; i++) f32[i] = i16[i] / 0x8000;
        const buf = playCtx.createBuffer(1, f32.length, OUTPUT_RATE); buf.getChannelData(0).set(f32);
        const node = playCtx.createBufferSource(); node.buffer = buf; node.connect(playCtx.destination);
        const t = Math.max(playCtx.currentTime, playHead); node.start(t); playHead = t + buf.duration;
        scheduled.push(node); node.onended = () => { scheduled = scheduled.filter((n) => n !== node); };
      }
      function flushPlayback() {
        for (const n of scheduled) { try { n.stop(); } catch (e) {} }
        scheduled = []; if (playCtx) playHead = playCtx.currentTime;
      }

      let sock = null, pendingUser = null;
      function send(obj) { if (sock && sock.readyState === 1) sock.send(JSON.stringify(obj)); }

      function connect() {
        const proto = location.protocol === 'https:' ? 'wss' : 'ws';
        sock = new WebSocket(`${proto}://${location.host}/ws?${query()}`);
        sock.binaryType = 'arraybuffer';
        sock.onopen = () => setStatus('listening…', true);
        sock.onclose = () => setStatus('stopped');
        sock.onerror = () => setStatus('connection error');
        sock.onmessage = (ev) => {
          if (ev.data instanceof ArrayBuffer) { playPCM(ev.data); return; }
          const m = JSON.parse(ev.data);
          if (m.type === 'speech_started') {
            flushPlayback();
            if (!pendingUser) { pendingUser = addBubble('🎙 …', 'user'); pendingUser.classList.add('pending'); }
          } else if (m.type === 'user') {
            if (pendingUser) { pendingUser.textContent = m.text; pendingUser.classList.remove('pending'); pendingUser = null; }
            else { addBubble(m.text, 'user'); }
          } else if (m.type === 'assistant') {
            addBubble(m.text, 'assistant');
          }
        };
      }

      let watching = false, watchTimer = null;
      function setWatch(on) {
        watching = on && running;
        watchBtn.classList.toggle('on', watching);
        if (watchTimer) { clearInterval(watchTimer); watchTimer = null; }
        if (watching) watchTimer = setInterval(() => send({ type: 'nudge' }), WATCH_MS);
      }
      watchBtn.onclick = () => { if (running) setWatch(!watching); };

      let micCtx = null, mediaStream = null, micNode = null, frameTimer = null, canvas = null, running = false;

      async function start() {
        ensurePlayback();
        mediaStream = await navigator.mediaDevices.getUserMedia({
          audio: { channelCount: 1, echoCancellation: true, noiseSuppression: true },
          video: { facingMode: { ideal: 'environment' } },
        });
        video.srcObject = mediaStream;
        hint.style.display = 'none';
        connect();
        startMic();
        startFrames();
        running = true; toggleBtn.textContent = 'Stop'; toggleBtn.classList.add('stop');
        watchBtn.disabled = false;
      }

      function startMic() {
        micCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: INPUT_RATE });
        const src = micCtx.createMediaStreamSource(mediaStream);
        micNode = micCtx.createScriptProcessor(4096, 1, 1);
        const mute = micCtx.createGain(); mute.gain.value = 0;
        src.connect(micNode); micNode.connect(mute); mute.connect(micCtx.destination);
        micNode.onaudioprocess = (e) => {
          if (!sock || sock.readyState !== 1) return;
          const f32 = e.inputBuffer.getChannelData(0); const i16 = new Int16Array(f32.length);
          for (let i = 0; i < f32.length; i++) { const s = Math.max(-1, Math.min(1, f32[i])); i16[i] = s < 0 ? s * 0x8000 : s * 0x7fff; }
          sock.send(i16.buffer);
        };
      }

      function startFrames() {
        canvas = document.createElement('canvas');
        frameTimer = setInterval(() => {
          if (!sock || sock.readyState !== 1 || !video.videoWidth) return;
          const scale = FRAME_W / video.videoWidth;
          canvas.width = FRAME_W; canvas.height = Math.round(video.videoHeight * scale);
          canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
          canvas.toBlob((blob) => {
            if (!blob) return;
            const reader = new FileReader();
            reader.onload = () => send({ type: 'image', data: String(reader.result).split(',')[1], mime: 'image/jpeg' });
            reader.readAsDataURL(blob);
          }, 'image/jpeg', 0.6);
        }, FRAME_MS);
      }

      function stop() {
        running = false; toggleBtn.textContent = 'Start'; toggleBtn.classList.remove('stop');
        setWatch(false); watchBtn.disabled = true;
        if (frameTimer) { clearInterval(frameTimer); frameTimer = null; }
        if (micNode) { micNode.disconnect(); micNode.onaudioprocess = null; micNode = null; }
        if (micCtx) { micCtx.close(); micCtx = null; }
        if (mediaStream) { mediaStream.getTracks().forEach((t) => t.stop()); mediaStream = null; }
        video.srcObject = null; hint.style.display = 'grid';
        if (sock) { try { sock.close(); } catch (e) {} sock = null; }
        flushPlayback(); setStatus('stopped');
      }

      toggleBtn.onclick = async () => {
        if (running) { stop(); return; }
        try { await start(); } catch (err) { setStatus('error: ' + err.message); }
      };

      function sendText() {
        const q = textInput.value.trim(); if (!q) return;
        ensurePlayback(); addBubble(q, 'user'); send({ type: 'text', text: q }); textInput.value = '';
      }
      sendBtn.onclick = sendText;
      textInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') sendText(); });
    </script>
  </body>
</html>
