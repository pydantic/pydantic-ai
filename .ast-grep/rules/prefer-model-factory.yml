id: prefer-model-factory
language: python
severity: error
message: >-
  Use the matching `<provider>_model` factory fixture from tests/models/conftest.py
  (`google_model`, `anthropic_model`, `openrouter_model`) instead of hand-building
  `Provider(api_key=...)` + `Model(...)`. The factory centralizes api-key wiring for
  VCR integration tests. If you genuinely need a one-off provider (custom
  base_url/http_client, a non-default api_key, or a custom client), add
  `# ast-grep-ignore` with a short reason.
files:
  - 'tests/models/**'
ignores:
  - '**/conftest.py'
rule:
  any:
    - pattern: GoogleProvider(api_key=$$$)
    - pattern: AnthropicProvider(api_key=$$$)
    - pattern: OpenRouterProvider(api_key=$$$)
