      answer: |-
        Pydantic AI is an open-source, production-grade Python framework designed for building type-safe generative AI agents [1][2][3]. Developed by the Pydantic team, it aims to provide an ergonomic developer experience similar to FastAPI by leveraging Pydantic's data validation for structured inputs and outputs [4][5][6]. The framework is model-agnostic, supporting major providers like OpenAI, Anthropic, and Google, while including built-in tools for observability, dependency injection, and multi-agent workflows [2][7][6].

        To get started, install the library and define an agent:

        ```python
        from pydantic_ai import Agent

        agent = Agent('openai:gpt-4o')
        result = agent.run_sync('What is the capital of France?')
        print(result.data)
        ```

        [5][8]
