            response:
              search_suggestions: |-
                <style>
                .container {
                  align-items: center;
                  border-radius: 8px;
                  display: flex;
                  font-family: Google Sans, Roboto, sans-serif;
                  font-size: 14px;
                  line-height: 20px;
                  padding: 8px 12px;
                }
                .chip {
                  display: inline-block;
                  border: solid 1px;
                  border-radius: 16px;
                  min-width: 14px;
                  padding: 5px 16px;
                  text-align: center;
                  user-select: none;
                  margin: 0 8px;
                  -webkit-tap-highlight-color: transparent;
                }
                .carousel {
                  overflow: auto;
                  scrollbar-width: none;
                  white-space: nowrap;
                  margin-right: -12px;
                }
                .headline {
                  display: flex;
                  margin-right: 4px;
                }
                .gradient-container {
                  position: relative;
                }
                .gradient {
                  position: absolute;
                  transform: translate(3px, -9px);
                  height: 36px;
                  width: 9px;
                }
                @media (prefers-color-scheme: light) {
                  .container {
                    background-color: #fafafa;
                    box-shadow: 0 0 0 1px #0000000f;
                  }
                  .headline-label {
                    color: #1f1f1f;
                  }
                  .chip {
                    background-color: #ffffff;
                    border-color: #d2d2d2;
                    color: #5e5e5e;
                    text-decoration: none;
                  }
                  .chip:hover {
                    background-color: #f2f2f2;
                  }
                  .chip:focus {
                    background-color: #f2f2f2;
                  }
                  .chip:active {
                    background-color: #d8d8d8;
                    border-color: #b6b6b6;
                  }
                  .logo-dark {
                    display: none;
                  }
                  .gradient {
                    background: linear-gradient(90deg, #fafafa 15%, #fafafa00 100%);
                  }
                }
