      - text: |-
          # What is Python?

          **Python** is a high-level, interpreted programming language created by Guido van Rossum and first released in 1991. It emphasizes code readability and simplicity, using clean syntax with significant whitespace (indentation) to define code blocks.

          ## Key Characteristics:
          - **Easy to learn**: Simple, English-like syntax
          - **Interpreted**: Code runs line-by-line without compilation
          - **Dynamically typed**: No need to declare variable types
          - **Multi-paradigm**: Supports procedural, object-oriented, and functional programming
          - **Extensive libraries**: Vast ecosystem of packages and frameworks

          ## Main Use Cases:

          ### 1. **Web Development**
             - Frameworks: Django, Flask, FastAPI
             - Building websites, APIs, and web applications

          ### 2. **Data Science & Analysis**
             - Libraries: Pandas, NumPy, Matplotlib
             - Data manipulation, statistical analysis, visualization

          ### 3. **Machine Learning & AI**
             - Libraries: TensorFlow, PyTorch, scikit-learn
             - Building predictive models, neural networks, AI systems

          ### 4. **Automation & Scripting**
             - Automating repetitive tasks
             - System administration, file operations

          ### 5. **Scientific Computing**
             - Libraries: SciPy, SymPy
             - Simulations, mathematical computations

          ### 6. **Software Development**
             - Backend services, desktop applications
             - Game development (Pygame)

          ### 7. **DevOps & Cloud**
             - Infrastructure automation, deployment scripts
             - Cloud service management (AWS, Azure, GCP)

          Python's versatility, readability, and strong community support make it one of the most popular programming languages worldwide.
