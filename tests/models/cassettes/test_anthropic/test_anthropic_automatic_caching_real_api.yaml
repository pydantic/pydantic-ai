      - text: |-
          # Python: Overview and Main Use Cases

          ## What is Python?

          Python is a **high-level, interpreted programming language** created by Guido van Rossum and first released in 1991. It's designed with an emphasis on code readability and simplicity, using significant whitespace (indentation) to define code blocks.

          ### Key Characteristics:
          - **Easy to learn and read** - Clean, English-like syntax
          - **Interpreted** - Code runs directly without compilation
          - **Dynamically typed** - No need to declare variable types
          - **Multi-paradigm** - Supports procedural, object-oriented, and functional programming
          - **Extensive standard library** - "Batteries included" philosophy

          ## Main Use Cases

          ### 1. **Web Development**
          - Frameworks: Django, Flask, FastAPI
          - Backend services and APIs

          ### 2. **Data Science & Analytics**
          - Libraries: Pandas, NumPy, Matplotlib
          - Data manipulation and visualization

          ### 3. **Machine Learning & AI**
          - Libraries: TensorFlow, PyTorch, scikit-learn
          - Deep learning and neural networks

          ### 4. **Automation & Scripting**
          - Task automation
          - System administration

          ### 5. **Scientific Computing**
          - Research and computational analysis
          - Libraries: SciPy, SymPy

          ### 6. **Software Development**
          - Prototyping
          - Desktop applications (PyQt, Tkinter)

          ### 7. **Cybersecurity**
          - Penetration testing
          - Security analysis tools

          ### 8. **Game Development**
          - Pygame library
          - Scripting for game engines

          Python's versatility, large community, and rich ecosystem make it one of the most popular programming languages today.
