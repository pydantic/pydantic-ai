      - text: |-
          # What is Python?

          **Python** is a high-level, interpreted programming language created by Guido van Rossum and first released in 1991. It emphasizes code readability and simplicity, with a clean syntax that uses indentation to define code blocks.

          ## Key Characteristics:
          - **Easy to learn and read** - syntax resembles natural English
          - **Interpreted** - code runs line-by-line without compilation
          - **Dynamically typed** - no need to declare variable types
          - **Multi-paradigm** - supports procedural, object-oriented, and functional programming
          - **Extensive libraries** - vast ecosystem of packages and frameworks

          ## Main Use Cases:

          ### 1. **Data Science & Machine Learning**
          - Data analysis and visualization (pandas, NumPy, Matplotlib)
          - Machine learning models (scikit-learn, TensorFlow, PyTorch)
          - Statistical analysis

          ### 2. **Web Development**
          - Backend frameworks (Django, Flask, FastAPI)
          - Building APIs and web applications

          ### 3. **Automation & Scripting**
          - Task automation
          - System administration
          - File processing and batch operations

          ### 4. **Scientific Computing**
          - Research simulations
          - Mathematical computations (SciPy)
          - Academic research

          ### 5. **Artificial Intelligence**
          - Natural language processing
          - Computer vision
          - Deep learning applications

          ### 6. **Software Development**
          - Desktop applications
          - Prototyping
          - DevOps tools

          ### 7. **Game Development**
          - Pygame for 2D games
          - Game scripting

          ### 8. **Cybersecurity**
          - Penetration testing
          - Security analysis tools

          Python's versatility, beginner-friendliness, and strong community support make it one of the most popular programming languages in the world today.
