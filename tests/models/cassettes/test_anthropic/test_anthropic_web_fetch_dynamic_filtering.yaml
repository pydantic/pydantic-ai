                Logfire](#instrumentation-with-pydantic-logfire)\n* [llms.txt](#llmstxt)\n* [Next Steps](#next-steps)\n\n#
                Pydantic AI\n\n![Pydantic AI](https://ai.pydantic.dev/img/pydantic-ai-dark.svg#only-dark)\n\n![Pydantic AI](https://ai.pydantic.dev/img/pydantic-ai-light.svg#only-light)\n\n*GenAI
                Agent Framework, the Pydantic way*\n\n[![CI](https://github.com/pydantic/pydantic-ai/actions/workflows/ci.yml/badge.svg?event=push)](https://github.com/pydantic/pydantic-ai/actions/workflows/ci.yml?query=branch%3Amain)\n[![Coverage](https://coverage-badge.samuelcolvin.workers.dev/pydantic/pydantic-ai.svg)](https://coverage-badge.samuelcolvin.workers.dev/redirect/pydantic/pydantic-ai)\n[![PyPI](https://img.shields.io/pypi/v/pydantic-ai.svg)](https://pypi.python.org/pypi/pydantic-ai)\n[![versions](https://img.shields.io/pypi/pyversions/pydantic-ai.svg)](https://github.com/pydantic/pydantic-ai)\n[![license](https://img.shields.io/github/license/pydantic/pydantic-ai.svg)](https://github.com/pydantic/pydantic-ai/blob/main/LICENSE)\n[![Join
                Slack](https://img.shields.io/badge/Slack-Join%20Slack-4A154B?logo=slack)](https://logfire.pydantic.dev/docs/join-slack/)\n\nPydantic
                AI is a Python agent framework designed to help you\nquickly, confidently, and painlessly build production
                grade applications and workflows with Generative AI.\n\nFastAPI revolutionized web development by offering
                an innovative and ergonomic design, built on the foundation of [Pydantic Validation](https://docs.pydantic.dev)
                and modern Python features like type hints.\n\nYet despite virtually every Python agent framework and LLM
                library using Pydantic Validation, when we began to use LLMs in [Pydantic Logfire](https://pydantic.dev/logfire),
                we couldn't find anything that gave us the same feeling.\n\nWe built Pydantic AI with one simple aim: to bring
                that FastAPI feeling to GenAI app and agent development.\n\n## Why use Pydantic AI\n\n1. **Built by the Pydantic
                Team**:\n   [Pydantic Validation](https://docs.pydantic.dev/latest/) is the validation layer of the OpenAI
                SDK, the Google ADK, the Anthropic SDK, LangChain, LlamaIndex, AutoGPT, Transformers, CrewAI, Instructor and
                many more. *Why use the derivative when you can go straight to the source?* ![\U0001F603](https://cdn.jsdelivr.net/gh/jdecked/twemoji@16.0.1/assets/svg/1f603.svg
                \":smiley:\")\n2. **Model-agnostic**:\n   Supports virtually every [model](https://ai.pydantic.dev/models/overview/)
                and provider: OpenAI, Anthropic, Gemini, DeepSeek, Grok, Cohere, Mistral, and Perplexity; Azure AI Foundry,
                Amazon Bedrock, Google Vertex AI, Ollama, LiteLLM, Groq, OpenRouter, Together AI, Fireworks AI, Cerebras,
                Hugging Face, GitHub, Heroku, Vercel, Nebius, OVHcloud, Alibaba Cloud, SambaNova, and Outlines. If your favorite
                model or provider is not listed, you can easily implement a [custom model](https://ai.pydantic.dev/models/overview/#custom-models).\n3.
                **Seamless Observability**:\n   Tightly [integrates](https://ai.pydantic.dev/logfire/) with [Pydantic Logfire](https://pydantic.dev/logfire),
                our general-purpose OpenTelemetry observability platform, for real-time debugging, evals-based performance
                monitoring, and behavior, tracing, and cost tracking. If you already have an observability platform that supports
                OTel, you can [use that too](https://ai.pydantic.dev/logfire/#alternative-observability-backends).\n4. **Fully
                Type-safe**:\n   Designed to give your IDE or AI coding agent as much context as possible for auto-completion
                and [type checking](https://ai.pydantic.dev/agent/#static-type-checking), moving entire classes of errors
                from runtime to write-time for a bit of that Rust \"if it compiles, it works\" feel.\n5. **Powerful Evals**:\n
                \  Enables you to systematically test and [evaluate](https://ai.pydantic.dev/evals/) the performance and accuracy
                of the agentic systems you build, and monitor the performance over time in Pydantic Logfire.\n6. **Extensible
                by Design**:\n   Build agents from composable [capabilities](https://ai.pydantic.dev/capabilities/) that bundle
                tools, hooks, instructions, and model settings into reusable units. Use built-in capabilities for [web search](https://ai.pydantic.dev/capabilities/#provider-adaptive-tools),
                [thinking](https://ai.pydantic.dev/capabilities/#thinking), and [MCP](https://ai.pydantic.dev/capabilities/#provider-adaptive-tools),
                build your own, or install [third-party capability packages](https://ai.pydantic.dev/extensibility/). Define
                agents entirely in [YAML/JSON](https://ai.pydantic.dev/agent-spec/) -- no code required.\n7. **MCP, A2A, and
                UI**:\n   Integrates the [Model Context Protocol](https://ai.pydantic.dev/mcp/overview/), [Agent2Agent](https://ai.pydantic.dev/a2a/),
                and various [UI event stream](https://ai.pydantic.dev/ui/overview/) standards to give your agent access to
                external tools and data, let it interoperate with other agents, and build interactive applications with streaming
                event-based communication.\n8. **Human-in-the-Loop Tool Approval**:\n   Easily lets you flag that certain
                tool calls [require approval](https://ai.pydantic.dev/deferred-tools/#human-in-the-loop-tool-approval) before
                they can proceed, possibly depending on tool call arguments, conversation history, or user preferences.\n9.
                **Durable Execution**:\n   Enables you to build [durable agents](https://ai.pydantic.dev/durable_execution/overview/)
                that can preserve their progress across transient API failures and application errors or restarts, and handle
                long-running, asynchronous, and human-in-the-loop workflows with production-grade reliability.\n10. **Streamed
                Outputs**:\n    Provides the ability to [stream](https://ai.pydantic.dev/output/#streamed-results) structured
                output continuously, with immediate validation, ensuring real time access to generated data.\n11. **Graph
                Support**:\n    Provides a powerful way to define [graphs](https://ai.pydantic.dev/graph/) using type hints,
                for use in complex applications where standard control flow can degrade to spaghetti code.\n\nRealistically
                though, no list is going to be as convincing as [giving it a try](#next-steps) and seeing how it makes you
                feel!\n\n**Sign up for our newsletter, *The Pydantic Stack*, with updates & tutorials on Pydantic AI, Logfire,
                and Pydantic:**\n\nSubscribe\n\n## Hello World Example\n\nHere's a minimal example of Pydantic AI:\n\nWith
                Pydantic AI GatewayDirectly to Provider API\n\n[Learn about Gateway](https://ai.pydantic.dev/gateway) hello\\_world.py\n\n```\nfrom
                pydantic_ai import Agent\n\nagent = Agent(  # (1)!\n    'gateway/anthropic:claude-sonnet-4-6',\n    instructions='Be
                concise, reply with one sentence.',  # (2)!\n)\n\nresult = agent.run_sync('Where does \"hello world\" come
                from?')  # (3)!\nprint(result.output)\n\"\"\"\nThe first known use of \"hello, world\" was in a 1974 textbook
                about the C programming language.\n\"\"\"\n```\n\n1. We configure the agent to use [Anthropic's Claude Sonnet
                4.6](https://ai.pydantic.dev/api/models/anthropic/) model, but you can also set the model when running the
                agent.\n2. Register static [instructions](https://ai.pydantic.dev/agent/#instructions) using a keyword argument
                to the agent.\n3. [Run the agent](https://ai.pydantic.dev/agent/#running-agents) synchronously, starting a
                conversation with the LLM.\n\nhello\\_world.py\n\n```\nfrom pydantic_ai import Agent\n\nagent = Agent(  #
                (1)!\n    'anthropic:claude-sonnet-4-6',\n    instructions='Be concise, reply with one sentence.',  # (2)!\n)\n\nresult
                = agent.run_sync('Where does \"hello world\" come from?')  # (3)!\nprint(result.output)\n\"\"\"\nThe first
