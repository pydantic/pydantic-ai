                AI](https://pydantic.dev/docs/ai/img/pydantic-ai-light.svg)\n\n*GenAI Agent Framework, the Pydantic way*\n\n[![CI](https://github.com/pydantic/pydantic-ai/actions/workflows/ci.yml/badge.svg?event=push)](https://github.com/pydantic/pydantic-ai/actions/workflows/ci.yml?query=branch%3Amain)[![Coverage](https://coverage-badge.samuelcolvin.workers.dev/pydantic/pydantic-ai.svg)](https://coverage-badge.samuelcolvin.workers.dev/redirect/pydantic/pydantic-ai)[![PyPI](https://img.shields.io/pypi/v/pydantic-ai.svg)](https://pypi.python.org/pypi/pydantic-ai)[![versions](https://img.shields.io/pypi/pyversions/pydantic-ai.svg)](https://github.com/pydantic/pydantic-ai)[![license](https://img.shields.io/github/license/pydantic/pydantic-ai.svg)](https://github.com/pydantic/pydantic-ai/blob/main/LICENSE)[![Join
                Slack](https://img.shields.io/badge/Slack-Join%20Slack-4A154B?logo=slack)](https://logfire.pydantic.dev/docs/join-slack/)\n\nPydantic
                AI is a Python agent framework designed to help you\nquickly, confidently, and painlessly build production
                grade applications and workflows with Generative AI.\n\nFastAPI revolutionized web development by offering
                an innovative and ergonomic design, built on the foundation of [Pydantic Validation](https://docs.pydantic.dev)
                and modern Python features like type hints.\n\nYet despite virtually every Python agent framework and LLM
                library using Pydantic Validation, when we began to use LLMs in [Pydantic Logfire](https://pydantic.dev/logfire),
                we couldn't find anything that gave us the same feeling.\n\nWe built Pydantic AI with one simple aim: to bring
                that FastAPI feeling to GenAI app and agent development.\n\n## Why use Pydantic AI\n\n[#why-use-pydantic-ai](#why-use-pydantic-ai)\n\n1.
                **Built by the Pydantic Team**: [Pydantic Validation](https://docs.pydantic.dev/latest/) is the validation
                layer of the OpenAI SDK, the Google ADK, the Anthropic SDK, LangChain, LlamaIndex, AutoGPT, Transformers,
                CrewAI, Instructor and many more. *Why use the derivative when you can go straight to the source?* \U0001F603\n\n2.
                **Model-agnostic**:\nSupports virtually every [model](https://pydantic.dev/docs/ai/models/overview) and provider:
                OpenAI, Anthropic, Gemini, DeepSeek, Grok, Cohere, Mistral, and Perplexity; Azure AI Foundry, Amazon Bedrock,
                Google Vertex AI, Ollama, LiteLLM, Groq, OpenRouter, Together AI, Fireworks AI, Cerebras, Hugging Face, GitHub,
                Heroku, Vercel, Nebius, OVHcloud, Alibaba Cloud, SambaNova, and Outlines. If your favorite model or provider
                is not listed, you can easily implement a [custom model](https://pydantic.dev/docs/ai/models/overview#custom-models).\n\n3.
                **Seamless Observability**:\nTightly [integrates](https://pydantic.dev/docs/ai/integrations/logfire) with
                [Pydantic Logfire](https://pydantic.dev/logfire), our general-purpose OpenTelemetry observability platform,
                for real-time debugging, evals-based performance monitoring, and behavior, tracing, and cost tracking. If
                you already have an observability platform that supports OTel, you can [use that too](https://pydantic.dev/docs/ai/integrations/logfire#alternative-observability-backends).\n\n4.
                **Fully Type-safe**:\nDesigned to give your IDE or AI coding agent as much context as possible for auto-completion
                and [type checking](https://pydantic.dev/docs/ai/core-concepts/agent#static-type-checking), moving entire
                classes of errors from runtime to write-time for a bit of that Rust \"if it compiles, it works\" feel.\n\n5.
                **Powerful Evals**:\nEnables you to systematically test and [evaluate](https://pydantic.dev/docs/ai/evals/)
                the performance and accuracy of the agentic systems you build, and monitor the performance over time in Pydantic
                Logfire.\n\n6. **Extensible by Design**:\nBuild agents from composable [capabilities](https://pydantic.dev/docs/ai/core-concepts/capabilities)
                that bundle tools, hooks, instructions, and model settings into reusable units. Use built-in capabilities
                for [web search](https://pydantic.dev/docs/ai/core-concepts/capabilities#provider-adaptive-tools), [thinking](https://pydantic.dev/docs/ai/core-concepts/capabilities#thinking),
                and [MCP](https://pydantic.dev/docs/ai/core-concepts/capabilities#provider-adaptive-tools), pick from the
                [Pydantic AI Harness](https://pydantic.dev/docs/ai/harness/overview) capability library, build your own, or
                install [third-party capability packages](https://pydantic.dev/docs/ai/guides/extensibility). Define agents
                entirely in [YAML/JSON](https://pydantic.dev/docs/ai/core-concepts/agent-spec) -- no code required.\n\n7.
                **MCP, A2A, and UI**:\nIntegrates the [Model Context Protocol](https://pydantic.dev/docs/ai/mcp/overview),
                [Agent2Agent](https://pydantic.dev/docs/ai/integrations/a2a), and various [UI event stream](https://pydantic.dev/docs/ai/integrations/ui/overview)
                standards to give your agent access to external tools and data, let it interoperate with other agents, and
                build interactive applications with streaming event-based communication.\n\n8. **Human-in-the-Loop Tool Approval**:\nEasily
                lets you flag that certain tool calls [require approval](https://pydantic.dev/docs/ai/tools-toolsets/deferred-tools#human-in-the-loop-tool-approval)
                before they can proceed, possibly depending on tool call arguments, conversation history, or user preferences.\n\n9.
                **Durable Execution**:\nEnables you to build [durable agents](https://pydantic.dev/docs/ai/integrations/durable_execution/overview)
                that can preserve their progress across transient API failures and application errors or restarts, and handle
                long-running, asynchronous, and human-in-the-loop workflows with production-grade reliability.\n\n10. **Streamed
                Outputs**:\nProvides the ability to [stream](https://pydantic.dev/docs/ai/core-concepts/output#streamed-results)
                structured output continuously, with immediate validation, ensuring real time access to generated data.\n\n11.
                **Graph Support**:\nProvides a powerful way to define [graphs](https://pydantic.dev/docs/ai/graph/) using
                type hints, for use in complex applications where standard control flow can degrade to spaghetti code.\n\nRealistically
                though, no list is going to be as convincing as [giving it a try](#next-steps) and seeing how it makes you
                feel!\n\n**Sign up for our newsletter, *The Pydantic Stack*, with updates & tutorials on Pydantic AI, Logfire,
                and Pydantic:**\n\nSubscribe\n\n## Hello World Example\n\n[#hello-world-example](#hello-world-example)\n\nHere's
                a minimal example of Pydantic AI:\n\n\n\n*hello_world.py*\n\n\n\n```python\nfrom pydantic_ai import Agent\n\nagent
                = Agent(  # (1)\n  'anthropic:claude-sonnet-4-6',\n  instructions='Be concise, reply with one sentence.',
                \ # (2)\n)\n\nresult = agent.run_sync('Where does \"hello world\" come from?')  # (3)\nprint(result.output)\n\"\"\"\nThe
                first known use of \"hello, world\" was in a 1974 textbook about the C programming language.\n\"\"\"\n```\n\n\n\n\n\nWe
                configure the agent to use [Anthropic's Claude Sonnet 4.6](https://pydantic.dev/docs/ai/models/anthropic)
                model, but you can also set the model when running the agent.\n\n\n\nRegister static [instructions](https://pydantic.dev/docs/ai/core-concepts/agent#instructions)
                using a keyword argument to the agent.\n\n\n\n[Run the agent](https://pydantic.dev/docs/ai/core-concepts/agent#running-agents)
                synchronously, starting a conversation with the LLM.\n\n*(This example is complete, it can be run \"as is\",
                assuming you've [installed the `pydantic_ai` package](https://pydantic.dev/docs/ai/overview/install))*\n\nThe
                exchange will be very short: Pydantic AI will send the instructions and the user prompt to the LLM, and the
                model will return a text response.\n\nNot very interesting yet, but we can easily add [tools](https://pydantic.dev/docs/ai/tools-toolsets/tools),
                [dynamic instructions](https://pydantic.dev/docs/ai/core-concepts/agent#instructions), [structured outputs](https://pydantic.dev/docs/ai/core-concepts/output),
                or composable [capabilities](https://pydantic.dev/docs/ai/core-concepts/capabilities) to build more powerful
                agents.\n\nHere's the same agent with [thinking](https://pydantic.dev/docs/ai/core-concepts/capabilities#thinking)
                and [web search](https://pydantic.dev/docs/ai/core-concepts/capabilities#provider-adaptive-tools) capabilities:\n\n*hello_world_capabilities.py*\n\n```python\nfrom
                pydantic_ai import Agent\nfrom pydantic_ai.capabilities import Thinking, WebSearch\n\nagent = Agent(\n    'anthropic:claude-sonnet-4-6',\n
                \   instructions='Be concise, reply with one sentence.',\n    capabilities=[Thinking(), WebSearch(local='duckduckgo')],\n)\n\nresult
                = agent.run_sync('What was the mass of the largest meteorite found this year?')\nprint(result.output)\n\"\"\"\nThe
                largest meteorite recovered this year weighed approximately 7.6 kg, found in the Sahara Desert in January.\n\"\"\"\n\n```\n\n##
                Tools & Dependency Injection Example\n\n[#tools--dependency-injection-example](#tools--dependency-injection-example)\n\nHere
                is a concise example using Pydantic AI to build a support agent for a bank:\n\n\n\n*bank_support.py*\n\n\n\n```python\nfrom
                dataclasses import dataclass\n\nfrom pydantic import BaseModel, Field\nfrom pydantic_ai import Agent, RunContext\n\nfrom
                bank_database import DatabaseConn\n\n\n@dataclass\nclass SupportDependencies:  # (3)\n  customer_id: int\n
                \ db: DatabaseConn  # (12)\n\n\nclass SupportOutput(BaseModel):  # (13)\n  support_advice: str = Field(description='Advice
                returned to the customer')\n  block_card: bool = Field(description=\"Whether to block the customer's card\")\n
                \ risk: int = Field(description='Risk level of query', ge=0, le=10)\n\n\nsupport_agent = Agent(  # (1)\n  'openai:gpt-5.2',
                \ # (2)\n  deps_type=SupportDependencies,\n  output_type=SupportOutput,  # (9)\n  instructions=(  # (4)\n
                \     'You are a support agent in our bank, give the '\n      'customer support and judge the risk level of
                their query.'\n  ),\n)\n\n\n@support_agent.instructions  # (5)\nasync def add_customer_name(ctx: RunContext[SupportDependencies])
                -> str:\n  customer_name = await ctx.deps.db.customer_name(id=ctx.deps.customer_id)\n  return f\"The customer's
                name is {customer_name!r}\"\n\n\n@support_agent.tool  # (6)\nasync def customer_balance(\n  ctx: RunContext[SupportDependencies],
                include_pending: bool\n) -> float:\n  \"\"\"Returns the customer's current account balance.\"\"\"  # (7)\n
                \ return await ctx.deps.db.customer_balance(\n      id=ctx.deps.customer_id,\n      include_pending=include_pending,\n
                \ )\n\n\n...  # (11)\n\n\nasync def main():\n  deps = SupportDependencies(customer_id=123, db=DatabaseConn())\n
                \ result = await support_agent.run('What is my balance?', deps=deps)  # (8)\n  print(result.output)  # (10)\n
                \ \"\"\"\n  support_advice='Hello John, your current account balance, including pending transactions, is $123.45.'
                block_card=False risk=1\n  \"\"\"\n\n  result = await support_agent.run('I just lost my card!', deps=deps)\n
                \ print(result.output)\n  \"\"\"\n  support_advice=\"I'm sorry to hear that, John. We are temporarily blocking
                your card to prevent unauthorized transactions.\" block_card=True risk=8\n  \"\"\"\n```\n\n\n\n\n\nThis [agent](https://pydantic.dev/docs/ai/core-concepts/agent)
                will act as first-tier support in a bank. Agents are generic in the type of dependencies they accept and the
                type of output they return. In this case, the support agent has type `Agent[SupportDependencies, SupportOutput]`.\n\n\n\nHere
                we configure the agent to use [OpenAI's GPT-5 model](https://pydantic.dev/docs/ai/models/openai), you can
                also set the model when running the agent.\n\n\n\nThe `SupportDependencies` dataclass is used to pass data,
                connections, and logic into the model that will be needed when running [instructions](https://pydantic.dev/docs/ai/core-concepts/agent#instructions)
                and [tool](https://pydantic.dev/docs/ai/tools-toolsets/tools) functions. Pydantic AI's system of dependency
                injection provides a [type-safe](https://pydantic.dev/docs/ai/core-concepts/agent#static-type-checking) way
                to customise the behavior of your agents, and can be especially useful when running [unit tests](https://pydantic.dev/docs/ai/guides/testing)
                and evals.\n\n\n\nStatic [instructions](https://pydantic.dev/docs/ai/core-concepts/agent#instructions) can
                be registered with the [`instructions` keyword argument](https://pydantic.dev/docs/ai/api/pydantic-ai/agent/#pydantic_ai.agent.Agent.__init__)
                to the agent.\n\n\n\nDynamic [instructions](https://pydantic.dev/docs/ai/core-concepts/agent#instructions)
                can be registered with the [`@agent.instructions`](https://pydantic.dev/docs/ai/api/pydantic-ai/agent/#pydantic_ai.agent.Agent.instructions)
                decorator, and can make use of dependency injection. Dependencies are carried via the [`RunContext`](https://pydantic.dev/docs/ai/api/pydantic-ai/tools/#pydantic_ai.tools.RunContext)
                argument, which is parameterized with the `deps_type` from above. If the type annotation here is wrong, static
                type checkers will catch it.\n\n\n\nThe [`@agent.tool`](https://pydantic.dev/docs/ai/tools-toolsets/tools)
                decorator let you register functions which the LLM may call while responding to a user. Again, dependencies
                are carried via [`RunContext`](https://pydantic.dev/docs/ai/api/pydantic-ai/tools/#pydantic_ai.tools.RunContext),
                any other arguments become the tool schema passed to the LLM. Pydantic is used to validate these arguments,
                and errors are passed back to the LLM so it can retry.\n\n\n\nThe docstring of a tool is also passed to the
                LLM as the description of the tool. Parameter descriptions are [extracted](https://pydantic.dev/docs/ai/tools-toolsets/tools#function-tools-and-schema)
                from the docstring and added to the parameter schema sent to the LLM.\n\n\n\n[Run the agent](https://pydantic.dev/docs/ai/core-concepts/agent#running-agents)
                asynchronously, conducting a conversation with the LLM until a final response is reached. Even in this fairly
                simple case, the agent will exchange multiple messages with the LLM as tools are called to retrieve an output.\n\n\n\nThe
                response from the agent will be guaranteed to be a `SupportOutput`. If validation fails [reflection](https://pydantic.dev/docs/ai/core-concepts/agent#reflection-and-self-correction),
                the agent is prompted to try again.\n\n\n\nThe output will be validated with Pydantic to guarantee it is a
                `SupportOutput`, since the agent is generic, it'll also be typed as a `SupportOutput` to aid with static type
                checking.\n\n\n\nIn a real use case, you'd add more tools and longer instructions to the agent to extend the
                context it's equipped with and support it can provide.\n\n\n\nThis is a simple sketch of a database connection,
                used to keep the example short and readable. In reality, you'd be connecting to an external database (e.g.
                PostgreSQL) to get information about customers.\n\n\n\nThis [Pydantic](https://docs.pydantic.dev) model is
                used to constrain the structured data returned by the agent. From this simple definition, Pydantic builds
                the JSON Schema that tells the LLM how to return the data, and performs validation to guarantee the data is
                correct at the end of the run.\n\nComplete `bank_support.py` example\n\nThe code included here is incomplete
                for the sake of brevity (the definition of `DatabaseConn` is missing); you can find the complete `bank_support.py`
                example [here](https://pydantic.dev/docs/ai/examples/bank-support).\n\n## Instrumentation with Pydantic Logfire\n\n[#instrumentation-with-pydantic-logfire](#instrumentation-with-pydantic-logfire)\n\nEven
                a simple agent with just a handful of tools can result in a lot of back-and-forth with the LLM, making it
                nearly impossible to be confident of what's going on just from reading the code.\nTo understand the flow of
                the above runs, we can watch the agent in action using Pydantic Logfire.\n\nTo do this, we need to [set up
                Logfire](https://pydantic.dev/docs/ai/integrations/logfire#using-logfire), and add the following to our code:\n\n\n\n*bank_support_with_logfire.py*\n\n\n\n```python\n...\nfrom
                pydantic_ai import Agent, RunContext\n\nfrom bank_database import DatabaseConn\n\nimport logfire\n\nlogfire.configure()
                \ # (1)\nlogfire.instrument_pydantic_ai()  # (2)\nlogfire.instrument_sqlite3()  # (3)\n\n...\n\nsupport_agent
                = Agent(\n  'openai:gpt-5.2',\n  deps_type=SupportDependencies,\n  output_type=SupportOutput,\n  instructions=(\n
                \     'You are a support agent in our bank, give the '\n      'customer support and judge the risk level of
                their query.'\n  ),\n)\n```\n\n\n\n\n\nConfigure the Logfire SDK, this will fail if project is not set up.\n\n\n\nThis
                will instrument all Pydantic AI agents used from here on out. To instrument only a specific agent, add an
                [`Instrumentation`](https://pydantic.dev/docs/ai/api/pydantic-ai/capabilities/#pydantic_ai.capabilities.Instrumentation)
                entry to the agent's `capabilities=[...]`.\n\n\n\nIn our demo, `DatabaseConn` uses [`sqlite3`](https://docs.python.org/3/library/sqlite3.html#module-sqlite3)
                to connect to a PostgreSQL database, so [`logfire.instrument_sqlite3()`](https://logfire.pydantic.dev/docs/integrations/databases/sqlite3/)
                is used to log the database queries.\n\nThat's enough to get the following view of your agent in action:\n\n[https://logfire-eu.pydantic.dev/public-trace/a2957caa-b7b7-4883-a529-777742649004?spanId=31aade41ab896144&amp;embedded=true](https://logfire-eu.pydantic.dev/public-trace/a2957caa-b7b7-4883-a529-777742649004?spanId=31aade41ab896144&amp;embedded=true)\n\n*Logfire
                instrumentation for the bank agent -- [View in Logfire](https://logfire-eu.pydantic.dev/public-trace/a2957caa-b7b7-4883-a529-777742649004?spanId=31aade41ab896144)*\n\nSee
                [Monitoring and Performance](https://pydantic.dev/docs/ai/integrations/logfire) to learn more.\n\n## `llms.txt`\n\n[#llmstxt](#llmstxt)\n\nThe
                Pydantic AI documentation is available in the [llms.txt](https://llmstxt.org/) format.\nThis format is defined
                in Markdown and suited for LLMs and AI coding assistants and agents.\n\nTwo formats are available:\n\n- [`llms.txt`](https://ai.pydantic.dev/llms.txt):
                a file containing a brief description\nof the project, along with links to the different sections of the documentation.
                The structure\nof this file is described in details [here](https://llmstxt.org/#format).\n- [`llms-full.txt`](https://ai.pydantic.dev/llms-full.txt):
                Similar to the `llms.txt` file,\nbut every link content is included. Note that this file may be too large
                for some LLMs.\n\n\nAs of today, these files are not automatically leveraged by IDEs or coding agents, but
                they will use it if you provide a link or the full text.\n\n## Next Steps\n\n[#next-steps](#next-steps)\n\nTo
                try Pydantic AI for yourself, [install it](https://pydantic.dev/docs/ai/overview/install) and follow the instructions
                [in the examples](https://pydantic.dev/docs/ai/examples/setup).\n\nRead the [docs](https://pydantic.dev/docs/ai/core-concepts/agent)
                to learn more about building applications with Pydantic AI.\n\nRead the [API Reference](https://pydantic.dev/docs/ai/api/pydantic-ai/agent)
                to understand Pydantic AI's interface.\n\nJoin [Slack](https://logfire.pydantic.dev/docs/join-slack/) or file
                an issue on [GitHub](https://github.com/pydantic/pydantic-ai/issues) if you have any questions.\n\n\n\n Was
                this page helpful?\n\n  \n\n  \n\n  \n\n\n\n\n\n [Previous Visual studio code](https://pydantic.dev/docs/validation/1.10/extras/visual_studio_code/)
                [Next Installation](https://pydantic.dev/docs/ai/overview/install/)\n\n  \n\n  \n\n  \n\n\n\n © Pydantic Services
                Inc. 2025 to present\n\n [https://github.com/pydantic](https://github.com/pydantic \"Pydantic on GitHub\")
                [https://x.com/pydantic](https://x.com/pydantic \"Pydantic on X\") [https://www.linkedin.com/company/pydantic/](https://www.linkedin.com/company/pydantic/
                \"Pydantic on LinkedIn\") [https://bsky.app/profile/pydantic.dev](https://bsky.app/profile/pydantic.dev \"Pydantic
                on Bluesky\")\n\n\n\n  "
