            import pandas as pd
            import os

            # Create data with numbers 1 to 5 and their squares
            numbers = list(range(1, 6))
            squares = [n**2 for n in numbers]

            # Create a DataFrame
            df = pd.DataFrame({
                'Number': numbers,
                'Square': squares
            })

            # Display the DataFrame
            print("DataFrame created:")
            print(df)

            # Save to CSV in /tmp first
            csv_path = '/tmp/numbers_and_squares.csv'
            df.to_csv(csv_path, index=False)
            print(f"\nCSV saved to: {csv_path}")

            # Copy to OUTPUT_DIR for download
            output_path = os.path.join(os.environ['OUTPUT_DIR'], 'numbers_and_squares.csv')
            df.to_csv(output_path, index=False)
            print(f"CSV exported to: {output_path}")
