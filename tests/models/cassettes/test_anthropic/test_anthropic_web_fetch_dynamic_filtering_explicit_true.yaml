                pydantic_ai import Agent\n\nagent = Agent(  # (1)!\n    'gateway/anthropic:claude-sonnet-4-6',\n    instructions='Be
                concise, reply with one sentence.',  # (2)!\n)\n\nresult = agent.run_sync('Where does \"hello world\" come
                from?')  # (3)!\nprint(result.output)\n\"\"\"\nThe first known use of \"hello, world\" was in a 1974 textbook
                about the C programming language.\n\"\"\"\n```\n\n1. We configure the agent to use [Anthropic's Claude Sonnet
                4.6](https://ai.pydantic.dev/api/models/anthropic/) model, but you can also set the model when running the
                agent.\n2. Register static [instructions](https://ai.pydantic.dev/agent/#instructions) using a keyword argument
                to the agent.\n3. [Run the agent](https://ai.pydantic.dev/agent/#running-agents) synchronously, starting a
                conversation with the LLM.\n\nhello\\_world.py\n\n```\nfrom pydantic_ai import Agent\n\nagent = Agent(  #
                (1)!\n    'anthropic:claude-sonnet-4-6',\n    instructions='Be concise, reply with one sentence.',  # (2)!\n)\n\nresult
                = agent.run_sync('Where does \"hello world\" come from?')  # (3)!\nprint(result.output)\n\"\"\"\nThe first
                known use of \"hello, world\" was in a 1974 textbook about the C programming language.\n\"\"\"\n```\n\n1.
                We configure the agent to use [Anthropic's Claude Sonnet 4.6](https://ai.pydantic.dev/api/models/anthropic/)
                model, but you can also set the model when running the agent.\n2. Register static [instructions](https://ai.pydantic.dev/agent/#instructions)
                using a keyword argument to the agent.\n3. [Run the agent](https://ai.pydantic.dev/agent/#running-agents)
                synchronously, starting a conversation with the LLM.\n\n*(This example is complete, it can be run \"as is\",
                assuming you've [installed the `pydantic_ai` package](https://ai.pydantic.dev/install/))*\n\nThe exchange
                will be very short: Pydantic AI will send the instructions and the user prompt to the LLM, and the model will
                return a text response.\n\nNot very interesting yet, but we can easily add [tools](https://ai.pydantic.dev/tools/),
                [dynamic instructions](https://ai.pydantic.dev/agent/#instructions), [structured outputs](https://ai.pydantic.dev/output/),
                or composable [capabilities](https://ai.pydantic.dev/capabilities/) to build more powerful agents.\n\nHere's
                the same agent with [thinking](https://ai.pydantic.dev/capabilities/#thinking) and [web search](https://ai.pydantic.dev/capabilities/#provider-adaptive-tools)
                capabilities:\n\nWith Pydantic AI GatewayDirectly to Provider API\n\n[Learn about Gateway](https://ai.pydantic.dev/gateway)
                hello\\_world\\_capabilities.py\n\n```\nfrom pydantic_ai import Agent\nfrom pydantic_ai.capabilities import
                Thinking, WebSearch\n\nagent = Agent(\n    'gateway/anthropic:claude-sonnet-4-6',\n    instructions='Be concise,
                reply with one sentence.',\n    capabilities=[Thinking(), WebSearch()],\n)\n\nresult = agent.run_sync('What
                was the mass of the largest meteorite found this year?')\nprint(result.output)\n\"\"\"\nThe largest meteorite
                recovered this year weighed approximately 7.6 kg, found in the Sahara Desert in January.\n\"\"\"\n```\n\nhello\\_world\\_capabilities.py\n\n```\nfrom
                pydantic_ai import Agent\nfrom pydantic_ai.capabilities import Thinking, WebSearch\n\nagent = Agent(\n    'anthropic:claude-sonnet-4-6',\n
                \   instructions='Be concise, reply with one sentence.',\n    capabilities=[Thinking(), WebSearch()],\n)\n\nresult
                = agent.run_sync('What was the mass of the largest meteorite found this year?')\nprint(result.output)\n\"\"\"\nThe
                largest meteorite recovered this year weighed approximately 7.6 kg, found in the Sahara Desert in January.\n\"\"\"\n```\n\n##
                Tools & Dependency Injection Example\n\nHere is a concise example using Pydantic AI to build a support agent
                for a bank:\n\nWith Pydantic AI GatewayDirectly to Provider API\n\n[Learn about Gateway](https://ai.pydantic.dev/gateway)
                bank\\_support.py\n\n```\nfrom dataclasses import dataclass\n\nfrom pydantic import BaseModel, Field\nfrom
