          - text: |-
              Paris is home to several world-famous landmarks, most notably:

              *   **The Eiffel Tower:** Perhaps the most iconic symbol of both Paris and France, this iron lattice tower was built for the 1889 World's Fair.
              *   **The Louvre Museum:** The world's largest art museum and a historic monument, famous for housing the *Mona Lisa*.
              *   **Notre-Dame Cathedral:** A masterpiece of French Gothic architecture, known for its stunning stained glass and gargoyles.
