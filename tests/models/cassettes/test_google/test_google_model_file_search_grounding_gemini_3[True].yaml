        - text: |-
            The capital of France is **Paris**.

            Paris is not only the capital but also the largest city in France. It is a major global center for art, fashion, gastronomy, and culture. Often referred to as the "City of Light" (*La Ville Lumière*), it is home to world-famous landmarks such as the **Eiffel Tower**, the **Louvre Museum**, and the **Notre-Dame Cathedral**. The city is situated on the Seine River in the northern part of the country.
