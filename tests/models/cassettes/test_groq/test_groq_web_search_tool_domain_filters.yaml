              of the 3.13 series, compared to 3.12\n\nSome of the new major new features and changes in Python 3.13 are:\n\n##
              New features\n\n`locals()`\n\n## Typing\n\n`typing.TypeIs`\n\n## Removals and new deprecations\n\n`aifc`\n`audioop`\n`chunk`\n`cgi`\n`cgitb`\n`crypt`\n`imghdr`\n`mailcap`\n`msilib`\n`nis`\n`nntplib`\n`ossaudiodev`\n`pipes`\n`sndhdr`\n`spwd`\n`sunau`\n`telnetlib`\n`uu`\n`xdrlib`\n`lib2to3`\n\nFor
