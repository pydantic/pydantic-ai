        event: response.output_text.delta
        data: {"type":"response.output_text.delta","content_index":0,"delta":".","item_id":"msg_0146c8596b875fc40069e16f922db48190b8f1692f79cf06e0","logprobs":[],"obfuscation":"PYZjPYalXteOmju","output_index":0,"sequence_number":401}

        event: response.output_text.done
        data: {"type":"response.output_text.done","content_index":0,"item_id":"msg_0146c8596b875fc40069e16f922db48190b8f1692f79cf06e0","logprobs":[],"output_index":0,"sequence_number":402,"text":"The sun hovered above the horizon, spilling apricot-colored light across the sprawling meadow. Here, a young rabbit named Willow nestled in a thicket of clover, her nose twitching as she tasted the dawn. The world was painted with shimmering drops of dew that clung to every blade of grass, transforming the meadow into a sea of diamonds.\n\nWillow’s mottled brown fur blended seamlessly into the tapestry of wildflowers. Buttercups, bluebells, and scarlet poppies nodded softly in a breeze scented with earth and blossom. Tall grasses brushed against her as she ventured out, moving cautiously, heart quickened by adventure.\n\nEverywhere, life hummed. Bees hovered over spiky purple thistles, their tiny bodies dusted with golden pollen. Swallows dipped and darted above, silvered bellies flashing as they snapped at drifting insects. In the distance, a pair of deer moved ghostlike through the veils of morning mist.\n\nWillow flitted from clover patch to dandelion tuft, nibbling tender green shoots. Each mouthful tasted of rain and sunlight. She sat up, ears tall and swiveling to catch the rustle of a hidden field mouse foraging beneath the roots. Young and wide-eyed, Willow gazed upward as a cloud of butterflies spiraled skyward, their wings a kaleidoscope of amber, azure, and pearl.\n\nBeyond the crest of the hill, hay-colored wheat rippled in waves and the sweet scent of wild strawberries beckoned. Willow paused at the edge of a burrow, nose wrinkling at the warm, familiar scent of family.\n\nAs the sun climbed higher, painting the world in dazzling clarity, Willow flopped onto her side in a patch of sun-warmed grass. The world thrummed—alive with bees, songbirds, and wind, bound together by golden light. Safe, curious, and content, Willow knew the meadow was her kingdom, bright and boundless beneath the open sky."}

