          text: |-
            Beneath a canopy of emerald leaves, the early morning sun painted the forest floor in delicate dappled gold. Rustling quietly through undergrowth beaded with dew, a red fox named Lira slipped between bramble and fern, her russet fur glowing against the shadowy world.

            The air was thick with the scent of moss and wild garlic. Every step quickened Lira's heart--younger foxes might shy away from the unknown, but curiosity lit her amber eyes. Birds warbled high overhead, while a squirrel chattered in indignation from a low-hanging branch, its tail flickering like a candle flame. Lira paused, nose twitching, savoring the earthy perfume of leaf litter as she contemplated her path.

            Slipping through a patch of bluebells, their soft petals brushing her sides, she startled a family of rabbits who disappeared into a tangle of roots. Not far away, a chorus of frogs sang by a crystal brook. Lira padded closer, watching their comical leaps with tilted head, her own reflection rippling on the water's surface.

            Continuing on, she found a fallen oak, its ancient trunk sprawled across her path--a bridge blanketed in moss and lichen. With a light leap, she climbed atop it, where the world seemed to slow. Up here, she watched shafts of sunlight pierce the gloom, catching motes of pollen swirling in the air like gold dust. The forest buzzed around her, insect wings humming and leaves murmuring old secrets.

            Lira cocked her head, listening to the heartbeat of the forest--the distant hoot of an owl, the thump of a distant deer. Each sound was familiar, comforting, and a little thrilling. With one last glance at the waking world, she bounded off the log, disappearing into the green shadows, eager for whatever wonders lay hidden in the heart of the ancient wood.
