            - text: |-
                Great analogy! Just like crossing a street, crossing a river requires planning, safety awareness, and choosing the right method. Here are the main approaches:

                **Designated crossing points (like crosswalks):**
                - **Bridges** - The safest option when available
                - **Ferries** - Official water transportation
                - **Marked fords** - Shallow crossing points approved for wading

                **If no designated crossing exists:**
                1. **Assess the situation first:**
                   - Water depth, speed, and temperature
                   - Your swimming ability and fitness level
                   - Weather conditions and visibility
                   - Presence of hazards (rapids, debris, wildlife)

                2. **Crossing methods:**
                   - **Wading** - Only in shallow, slow-moving water
                   - **Swimming** - If you're a strong swimmer and conditions allow
                   - **Using flotation** - Kayak, raft, or other watercraft
                   - **Improvised bridge** - Fallen logs (test stability first)

                **Safety essentials:**
                - Never cross alone - use the buddy system
                - Wear a life jacket if available
                - Choose the narrowest, calmest section
                - Cross at an angle downstream to account for current
                - Have an exit strategy and know what's downstream
                - Consider hypothermia risk in cold water

                **When NOT to cross:**
                - Fast-moving or flood conditions
                - Water above your waist
                - Poor visibility or bad weather
                - If you're not a confident swimmer

                Just like with streets, sometimes the best choice is to find an alternate route or wait for better conditions!
