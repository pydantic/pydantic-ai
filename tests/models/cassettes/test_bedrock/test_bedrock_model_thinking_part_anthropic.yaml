                  text: This is a straightforward question about crossing the street safely. I should provide clear, practical safety advice that applies generally, while noting that specific rules may vary by location.
            - text: |-
                Here are the basic steps for crossing the street safely:

                **At intersections with traffic lights:**
                1. Wait for the pedestrian "Walk" signal
                2. Look both ways before stepping into the street
                3. Make eye contact with drivers when possible
                4. Cross briskly but don't run
                5. Stay alert for turning vehicles

                **At intersections without signals:**
                1. Stop at the curb or edge of the road
                2. Look left, then right, then left again
                3. Listen for approaching vehicles
                4. Wait for a clear gap in traffic
                5. Cross quickly but carefully

                **General safety tips:**
                - Use crosswalks and intersections when available
                - Avoid crossing between parked cars
                - Put away distractions like phones
                - Wear bright or reflective clothing in low light
                - Make yourself visible to drivers
                - Follow local traffic laws (some places may have specific rules)

                **If there's no crosswalk nearby:**
                - Find the shortest, straightest path across
                - Choose a spot with good visibility in both directions
                - Be extra cautious and patient

                Always remember that even when you have the right of way, it's important to stay alert and defensive since not all drivers follow traffic rules perfectly.
