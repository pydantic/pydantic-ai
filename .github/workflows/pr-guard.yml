name: PR Guard

on:
  pull_request_target:
    types: [opened, ready_for_review, edited]

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: pr-guard-${{ github.event.pull_request.number }}

jobs:
  guard:
    name: Guard
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check linked issues and guard against duplicates
        run: |
          set -euo pipefail

          PR_NUMBER=${{ github.event.pull_request.number }}
          PR_AUTHOR="${{ github.event.pull_request.user.login }}"
          AUTHOR_ASSOCIATION="${{ github.event.pull_request.author_association }}"
          PR_BODY=$(gh api "repos/${REPO}/pulls/${PR_NUMBER}" --jq '.body // ""')

          echo "PR #${PR_NUMBER} by ${PR_AUTHOR} (${AUTHOR_ASSOCIATION})"

          # Skip draft PRs — authors may create drafts to save progress
          if [ "${{ github.event.pull_request.draft }}" = "true" ]; then
            echo "PR is a draft, skipping checks."
            exit 0
          fi

          # Maintainer bypass
          if [[ "$AUTHOR_ASSOCIATION" == "MEMBER" || "$AUTHOR_ASSOCIATION" == "OWNER" || "$AUTHOR_ASSOCIATION" == "COLLABORATOR" ]]; then
            echo "Author is a maintainer/collaborator, skipping checks."
            exit 0
          fi

          # --- Contributor history (used for repeat offender detection + PR limits) ---
          # Use GitHub search API to get counts server-side instead of fetching all PRs.
          THIRTY_DAYS_AGO=$(date -u -d '30 days ago' '+%Y-%m-%dT%H:%M:%SZ')
          REJECTED_COUNT=$(gh api -X GET "search/issues" \
            -f q="repo:${REPO} type:pr author:${PR_AUTHOR} is:closed is:unmerged closed:>${THIRTY_DAYS_AGO}" \
            --jq '.total_count')
          MERGED_COUNT=$(gh api -X GET "search/issues" \
            -f q="repo:${REPO} type:pr author:${PR_AUTHOR} is:merged" \
            --jq '.total_count')
          echo "Author: ${REJECTED_COUNT} rejected PRs (last 30d), ${MERGED_COUNT} merged PRs total."

          # Repeat offender: 5+ rejected PRs in 30 days = close, 3+ = warn
          if [ "$REJECTED_COUNT" -ge 5 ]; then
            echo "Repeat offender (${REJECTED_COUNT} rejected). Closing."
            gh pr close "$PR_NUMBER" --repo "$REPO"
            gh pr comment "$PR_NUMBER" --repo "$REPO" --body "$(printf '%s\n\n%s\n\n%s' \
              "⚠️ You have had **${REJECTED_COUNT} PRs closed without merging** in the last 30 days." \
              "Please read our [contribution guidelines](https://github.com/${REPO}/blob/main/docs/contributing.md) before submitting further PRs. Continued spamming may result in being blocked from this repository." \
              "If you believe this is a mistake, please reach out on [Slack](https://logfire.pydantic.dev/docs/join-slack/) or comment on a relevant issue to discuss with maintainers.")" || true
            exit 0
          elif [ "$REJECTED_COUNT" -ge 3 ]; then
            gh pr comment "$PR_NUMBER" --repo "$REPO" --body "⚠️ You have had **${REJECTED_COUNT} PRs closed without merging** recently. Please read our [contribution guidelines](https://github.com/${REPO}/blob/main/docs/contributing.md). If you need help, reach out on [Slack](https://logfire.pydantic.dev/docs/join-slack/)." || true
          fi

          # PR limits: new contributors can only have a limited number of open PRs
          # 0 merged -> 1, 1 merged -> 2, 2 merged -> 3, 3+ merged -> unlimited
          if [ "$MERGED_COUNT" -lt 3 ]; then
            MAX_OPEN=$((MERGED_COUNT + 1))
            # Count all open PRs by this author, then subtract 1 for the current PR.
            ALL_OPEN=$(gh api -X GET "search/issues" \
              -f q="repo:${REPO} type:pr author:${PR_AUTHOR} is:open" \
              --jq '.total_count')
            OPEN_COUNT=$((ALL_OPEN > 0 ? ALL_OPEN - 1 : 0))
            echo "Open PRs (excluding this one): ${OPEN_COUNT} (limit: ${MAX_OPEN})."

            if [ "$OPEN_COUNT" -ge "$MAX_OPEN" ]; then
              echo "PR limit exceeded. Closing."
              gh pr close "$PR_NUMBER" --repo "$REPO"
              gh pr comment "$PR_NUMBER" --repo "$REPO" --body "$(printf '%s\n\n%s' \
                "You currently have **${OPEN_COUNT}** other open PR(s), and your limit is **${MAX_OPEN}** (based on **${MERGED_COUNT}** merged PR(s))." \
                "Please wait for existing PRs to be reviewed and merged before opening new ones. See our [contribution guidelines](https://github.com/${REPO}/blob/main/docs/contributing.md) for details.")" || true
              exit 0
            fi
          fi

          # Parse closing keywords from PR body
          # GitHub recognizes: close, closes, closed, fix, fixes, fixed, resolve, resolves, resolved
          # Case-insensitive, with optional leading - or *
          ISSUE_NUMBERS=$(printf '%s\n' "$PR_BODY" | grep -ioE '(^|\s|[-*]\s*)(close[sd]?|fix(es|ed)?|resolve[sd]?)\s+#[0-9]+' | grep -oE '[0-9]+' | sort -u || true)

          # --- Check 0: [bot] in PR title = auto-close ---
          # docs/contributing.md instructs AI agents to add [bot] to their PR title
          # for "expedited review". If they comply, we know it's a bot.
          if [[ "$PR_TITLE" == *"[bot]"* ]]; then
            echo "PR title contains [bot]. Closing."
            gh pr close "$PR_NUMBER" --repo "$REPO"
            gh pr comment "$PR_NUMBER" --repo "$REPO" --body "This PR has been automatically closed. If this is your work, please raise the PR yourself using the GitHub UI." || true
            exit 0
          fi

          # --- Check 1: PR must have the PR template ---
          # PRs created from the GitHub UI automatically include the template.
          # PRs created via `gh pr create`, API, or other tools typically don't.
          # We check for a known string from the template as a signal.
          if ! printf '%s\n' "$PR_BODY" | grep -q "Pre-Review Checklist"; then
            echo "PR is missing the PR template. Closing."
            COMMENT=$(printf '%s\n\n%s' \
              "This PR appears to be missing the [PR template](https://github.com/${REPO}/blob/main/.github/pull_request_template.md). PRs must be created using the GitHub UI, which automatically includes the template." \
              "Please re-submit your PR through the GitHub UI and fill in all required sections. See [contribution guidelines](https://github.com/${REPO}/blob/main/docs/contributing.md) for details.")
            gh pr close "$PR_NUMBER" --repo "$REPO"
            gh pr comment "$PR_NUMBER" --repo "$REPO" --body "$COMMENT" || true
            exit 0
          fi

          if [ -z "$ISSUE_NUMBERS" ]; then
            echo "No closing keywords found in PR body."
            exit 0
          fi

          echo "Found linked issues: $ISSUE_NUMBERS"

          # Fetch all open PRs once for duplicate detection.
          # This is only open PRs (not closed), so the volume is manageable.
          ALL_OPEN_PRS=$(gh api "repos/${REPO}/pulls?state=open&per_page=100" --paginate) || ALL_OPEN_PRS="[]"

          FOUND_OPEN_ISSUE="false"
          FOUND_CLOSED_ISSUE="false"
          for ISSUE_NUM in $ISSUE_NUMBERS; do
            echo ""
            echo "--- Checking issue #${ISSUE_NUM} ---"

            # Fetch issue details, skip if not found (gh api exits non-zero on 404)
            if ! ISSUE_JSON=$(gh api "repos/${REPO}/issues/${ISSUE_NUM}" 2>/dev/null); then
              echo "Issue #${ISSUE_NUM} not found, skipping."
              continue
            fi

            # Skip if this is actually a pull request
            IS_PR=$(echo "$ISSUE_JSON" | jq 'has("pull_request")')
            if [ "$IS_PR" = "true" ]; then
              echo "#${ISSUE_NUM} is a pull request, not an issue. Skipping."
              continue
            fi

            # Skip closed issues
            ISSUE_STATE=$(echo "$ISSUE_JSON" | jq -r '.state')
            if [ "$ISSUE_STATE" != "open" ]; then
              echo "Issue #${ISSUE_NUM} is ${ISSUE_STATE}, skipping."
              FOUND_CLOSED_ISSUE="true"
              continue
            fi

            FOUND_OPEN_ISSUE="true"

            # Check for duplicate/blocking PRs using closing keyword regex match
            echo "Checking for existing PRs targeting issue #${ISSUE_NUM}..."

            BLOCKING_PRS=""
            FOUND_STALE_PR="false"
            MATCHING_PRS=$(echo "$ALL_OPEN_PRS" | jq -c "[.[] | select(.number != ${PR_NUMBER} and (.body // \"\" | test(\"(?i)\\\\b(close[sd]?|fix(es|ed)?|resolve[sd]?)\\\\s+#${ISSUE_NUM}(\\\\s|$|[^0-9])\")))] | .[]")

            while IFS= read -r PR_JSON; do
              [ -z "$PR_JSON" ] && continue
              EXISTING_PR_NUM=$(echo "$PR_JSON" | jq -r '.number')
              EXISTING_PR_AUTHOR=$(echo "$PR_JSON" | jq -r '.user.login')
              echo "Found PR #${EXISTING_PR_NUM} by ${EXISTING_PR_AUTHOR} that references issue #${ISSUE_NUM}."

              # Check if the existing PR has the Stale label
              HAS_STALE=$(echo "$PR_JSON" | jq '[.labels[].name] | any(. == "Stale")')
              if [ "$HAS_STALE" = "true" ]; then
                echo "PR #${EXISTING_PR_NUM} is stale. Allowing new PR to supersede."
                FOUND_STALE_PR="true"
                continue
              fi

              BLOCKING_PRS="${BLOCKING_PRS:+${BLOCKING_PRS}, }#${EXISTING_PR_NUM}"
            done <<< "$MATCHING_PRS"

            if [ -n "$BLOCKING_PRS" ]; then
              echo "Closing PR #${PR_NUMBER} — issue #${ISSUE_NUM} already has active PRs: ${BLOCKING_PRS}"
              gh pr close "$PR_NUMBER" --repo "$REPO"
              gh pr comment "$PR_NUMBER" --repo "$REPO" --body "$(printf '%s\n\n%s\n\n%s' \
                "There are already open PRs addressing issue #${ISSUE_NUM}: ${BLOCKING_PRS}." \
                "To avoid duplicate effort, this PR has been closed. Feel free to review the existing PRs or share your thoughts on [issue #${ISSUE_NUM}](https://github.com/${REPO}/issues/${ISSUE_NUM})." \
                "If you believe the existing PRs are inactive, please comment on the issue and a maintainer can reassess.")" || true
              exit 0
            fi

            if [ "$FOUND_STALE_PR" = "true" ]; then
              echo "All existing PRs for issue #${ISSUE_NUM} are stale. Allowing new PR."
            fi

            # Try to assign PR author to the issue (best-effort)
            ASSIGNEES=$(echo "$ISSUE_JSON" | jq -r '[.assignees[].login] | join(",")')
            if [ -z "$ASSIGNEES" ]; then
              if gh api "repos/${REPO}/assignees/${PR_AUTHOR}" > /dev/null 2>&1; then
                gh api "repos/${REPO}/issues/${ISSUE_NUM}/assignees" --method POST -f "assignees[]=${PR_AUTHOR}" > /dev/null || true
                echo "Assigned ${PR_AUTHOR} to issue #${ISSUE_NUM}."
              fi
            elif echo ",$ASSIGNEES," | grep -q ",${PR_AUTHOR},"; then
              echo "Issue #${ISSUE_NUM} is already assigned to ${PR_AUTHOR}."
            else
              echo "Issue #${ISSUE_NUM} is assigned to someone else."
            fi
          done

          # If all referenced issues are closed, close the PR
          if [ "$FOUND_CLOSED_ISSUE" = "true" ] && [ "$FOUND_OPEN_ISSUE" = "false" ]; then
            echo "All referenced issues are closed. Closing PR."
            gh pr close "$PR_NUMBER" --repo "$REPO"
            gh pr comment "$PR_NUMBER" --repo "$REPO" --body "All issues referenced by this PR are already closed. If you believe an issue should be reopened, please comment on it first." || true
          fi
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR_TITLE: ${{ github.event.pull_request.title }}
