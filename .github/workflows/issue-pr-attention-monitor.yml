name: Issue and PR attention operations

on:
  schedule:
    - cron: '17 */6 * * *'
  workflow_dispatch: {}

permissions: {}

concurrency:
  group: issue-pr-attention-reconciliation
  cancel-in-progress: false

jobs:
  reconcile:
    if: github.repository == 'pydantic/pydantic-ai'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          ref: ${{ github.event.repository.default_branch }}
      - name: Reconcile maintainer-approved attention items
        env:
          ATTENTION_TRIAGE_STAGED: ${{ vars.ATTENTION_TRIAGE_STAGED }}
          GITHUB_TOKEN: ${{ github.token }}
        run: python .github/scripts/issue_pr_attention_monitor.py reconcile
