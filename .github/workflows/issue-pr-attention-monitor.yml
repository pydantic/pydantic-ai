name: Issue and PR attention operations

on:
  issues:
    types: [labeled, unlabeled]
  issue_comment:
    types: [created]
  # zizmor: ignore[dangerous-triggers] -- only label metadata is handled and
  # only the default-branch policy script is executed.
  pull_request_target:
    types: [labeled, unlabeled]
  pull_request_review:
    types: [submitted]
  pull_request_review_comment:
    types: [created]
  schedule:
    - cron: '17 */6 * * *'
  workflow_dispatch: {}

permissions: {}

concurrency:
  group: issue-pr-attention-${{ github.event.issue.number || github.event.pull_request.number || 'reminders' }}
  cancel-in-progress: false

jobs:
  event:
    if: >-
      github.repository == 'pydantic/pydantic-ai' &&
      github.event_name != 'schedule' &&
      github.event_name != 'workflow_dispatch'
      && (
        github.event_name == 'issues'
        || github.event_name == 'pull_request_target'
        || (
          github.event_name == 'issue_comment'
          && contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)
        )
        || (
          github.event_name == 'pull_request_review'
          && contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.review.author_association)
        )
        || (
          github.event_name == 'pull_request_review_comment'
          && contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)
        )
      )
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          ref: ${{ github.event.repository.default_branch }}
      - name: Apply ownership and label policy
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: python .github/scripts/issue_pr_attention_monitor.py event

  reminders:
    if: >-
      github.repository == 'pydantic/pydantic-ai' &&
      (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          ref: ${{ github.event.repository.default_branch }}
      - name: Ping unattended maintainers
        env:
          ATTENTION_TRIAGE_STAGED: ${{ vars.ATTENTION_TRIAGE_STAGED || 'true' }}
          GITHUB_TOKEN: ${{ github.token }}
        run: python .github/scripts/issue_pr_attention_monitor.py remind
