name: Issue and PR attention monitor

# Preview by default. Set the repository variable ATTENTION_MONITOR_STAGED=false
# after reviewing the Action summary to enable comments without another deploy.

on:
  schedule:
    - cron: '17 */6 * * *'
  workflow_dispatch:

permissions: {}

concurrency:
  group: issue-pr-attention-monitor
  cancel-in-progress: true

jobs:
  monitor:
    if: ${{ github.repository == 'pydantic/pydantic-ai' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Check issues and PRs for unattended activity
        env:
          ATTENTION_MONITOR_STAGED: ${{ vars.ATTENTION_MONITOR_STAGED || 'true' }}
          GITHUB_TOKEN: ${{ github.token }}
        run: python .github/scripts/issue_pr_attention_monitor.py
